<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="ab-bg" cx="78%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="40%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <linearGradient id="ab-cone" x1="0%" y1="0%" x2="100%" y2="40%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#eeeeee"/>
      <stop offset="100%" stop-color="#d7d7d7"/>
    </linearGradient>
    <linearGradient id="ab-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="ab-blue-deep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <filter id="ab-drop" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="960" height="220" rx="12" fill="url(#ab-bg)"/>
  <!-- Soft highlight (open space on right stays warm) -->
  <ellipse cx="720" cy="90" rx="280" ry="120" fill="rgba(255,224,178,0.35)"/>
  <!-- Shadow under horn -->
  <ellipse cx="175" cy="188" rx="95" ry="12" fill="rgba(0,0,0,0.11)"/>
  <g filter="url(#ab-drop)">
    <!-- Main cone -->
    <path fill="url(#ab-cone)" d="M52 168 L52 88 C52 74 64 64 80 60 L220 38 C248 32 276 48 288 72 L302 100 L302 148 C302 166 282 182 258 178 L92 170 C70 168 52 150 52 128 Z"/>
    <path fill="rgba(255,255,255,0.45)" d="M88 70 L248 44 L262 58 L98 84 Z"/>
    <!-- Front rim + inner (blue) -->
    <path fill="url(#ab-blue)" d="M288 72 L318 66 C334 64 348 76 352 92 L360 128 C362 142 352 156 336 160 L302 148 L302 100 Z"/>
    <path fill="url(#ab-blue-deep)" d="M302 100 L348 92 C356 90 362 98 364 106 L372 134 C374 144 368 152 358 154 L302 148 Z"/>
    <path fill="#bbdefb" opacity="0.85" d="M296 78 L330 72 L336 96 L304 104 Z"/>
    <!-- Handle -->
    <path fill="url(#ab-blue)" d="M96 158 L82 186 C76 196 62 198 52 188 L44 176 C38 168 42 156 54 152 L72 146 Z"/>
    <path fill="url(#ab-blue-deep)" d="M52 188 L46 204 C44 210 52 216 60 214 L76 206 L82 186 Z"/>
    <!-- Back cap -->
    <ellipse cx="62" cy="112" rx="20" ry="42" fill="url(#ab-blue-deep)"/>
    <ellipse cx="56" cy="112" rx="11" ry="30" fill="#0d47a1"/>
  </g>
  <!-- Lightning burst -->
  <g fill="#ffffff" opacity="0.98">
    <path d="M292 68 L312 64 L302 88 L326 82 L306 112 L284 102 L298 84 L276 90 Z"/>
    <path d="M318 84 L346 78 L328 108 L358 100 L332 132 L298 118 L314 96 L288 102 Z"/>
    <path d="M348 96 L382 88 L356 124 L396 114 L368 148 L324 128 L344 104 L312 110 Z"/>
  </g>
</svg>
