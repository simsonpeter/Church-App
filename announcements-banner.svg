<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="ab-paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4ead8"/>
      <stop offset="50%" stop-color="#e8dcc4"/>
      <stop offset="100%" stop-color="#dcc9ae"/>
    </linearGradient>
    <linearGradient id="ab-ink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a120c"/>
    </linearGradient>
    <filter id="ab-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="matrix" values="0 0 0 0 .92 0 0 0 0 .88 0 0 0 0 .78 0 0 0 .08 0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <!-- Frame -->
  <rect x="4" y="4" width="952" height="212" rx="4" fill="#c9b89a" stroke="#5c4a38" stroke-width="3"/>
  <path fill="none" stroke="#5c4a38" stroke-width="1.5" d="M12 12h936v196H12z"/>
  <!-- Corner crosses -->
  <g fill="#3d2e22" stroke="none">
    <path d="M24 20h4v8h8v4h-8v8h-4v-8h-8v-4h8z"/>
    <path d="M924 20h4v8h8v4h-8v8h-4v-8h-8v-4h8z"/>
    <path d="M24 188h4v8h8v4h-8v8h-4v-8h-8v-4h8z"/>
    <path d="M924 188h4v8h8v4h-8v8h-4v-8h-8v-4h8z"/>
  </g>
  <!-- Side wheat ticks -->
  <path fill="none" stroke="#6b5a45" stroke-width="1.2" stroke-linecap="round" d="M480 8v8M480 204v8M8 110h8M944 110h8"/>
  <!-- Parchment -->
  <rect x="48" y="36" width="420" height="148" rx="3" fill="url(#ab-paper)" stroke="#7a6548" stroke-width="2" transform="rotate(-0.8 258 110)"/>
  <circle cx="62" cy="48" r="5" fill="#4a3a2a"/>
  <circle cx="454" cy="48" r="5" fill="#4a3a2a"/>
  <path fill="none" stroke="#5c4a38" stroke-width="1" opacity="0.5" d="M72 130h360"/>
  <path fill="url(#ab-ink)" opacity="0.85" d="M240 168c-8-4-14-12-16-22 4 8 12 14 22 16-6 4-4 6-6 6z"/>
  <!-- Megaphone -->
  <g transform="translate(520 44)">
    <path fill="url(#ab-ink)" d="M180 20 L280 8 L300 100 L200 112 Z"/>
    <path fill="#3d2e22" d="M160 100c0-30 25-55 55-60l20 8-8 72-22-4c-28 5-45-6-45-16z"/>
    <path fill="none" stroke="#5c4a45" stroke-width="2" d="M200 28l60-6"/>
  </g>
  <!-- Medallion -->
  <circle cx="480" cy="178" r="18" fill="#a68b5c" stroke="#4a3a2a" stroke-width="2"/>
  <path fill="#2a1f14" d="M480 166v24M468 178h24" stroke="#2a1f14" stroke-width="2"/>
  <circle cx="480" cy="178" r="6" fill="none" stroke="#2a1f14" stroke-width="1.5"/>
  <!-- Books stack hint -->
  <rect x="820" y="48" width="100" height="18" rx="2" fill="#4a3528"/>
  <rect x="825" y="68" width="100" height="18" rx="2" fill="#2d4a38"/>
  <rect x="830" y="88" width="100" height="18" rx="2" fill="#8b7355"/>
</svg>
