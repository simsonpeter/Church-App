<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJC App - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="eyebrow">NJC Belgium</div>
            <h1>Welcome back</h1>
            <p>Your weekly faith journey in one place.</p>
        </header>

        <main class="app-content">
            <section class="card hero-card">
                <h2>This Week</h2>
                <ul class="list" id="this-week-events-list">
                    <li>
                        <h3>Loading this week events...</h3>
                        <p>Please wait while we calculate the next dates.</p>
                    </li>
                </ul>
                <a class="button-link" href="events.html">Open full events</a>
            </section>

            <section class="quick-actions">
                <a class="action-pill" href="events.html">
                    <span class="action-icon">EV</span>
                    <span class="action-label">Events</span>
                </a>
                <a class="action-pill" href="sermons.html">
                    <span class="action-icon">SR</span>
                    <span class="action-label">Sermons</span>
                </a>
                <a class="action-pill" href="contact.html">
                    <span class="action-icon">CT</span>
                    <span class="action-label">Contact</span>
                </a>
            </section>

            <section class="stats-grid">
                <article class="stat">
                    <strong>3</strong>
                    <span>Services</span>
                </article>
                <article class="stat">
                    <strong>2</strong>
                    <span>Prayer Nights</span>
                </article>
                <article class="stat">
                    <strong>5</strong>
                    <span>Teams</span>
                </article>
            </section>

        </main>

        <nav class="tab-nav">
            <a class="tab active" href="index.html"><span class="tab-icon">HM</span><span class="tab-label">Home</span></a>
            <a class="tab" href="about.html"><span class="tab-icon">AB</span><span class="tab-label">About</span></a>
            <a class="tab" href="events.html"><span class="tab-icon">EV</span><span class="tab-label">Events</span></a>
            <a class="tab" href="sermons.html"><span class="tab-icon">SR</span><span class="tab-label">Sermons</span></a>
            <a class="tab" href="contact.html"><span class="tab-icon">CT</span><span class="tab-label">Contact</span></a>
        </nav>
    </div>
    <script src="events-engine.js"></script>
    <script>
        (function () {
            var thisWeekEventsList = document.getElementById("this-week-events-list");
            var eventsUrl = "https://raw.githubusercontent.com/simsonpeter/njcbelgium/refs/heads/main/events.json";

            NjcEvents.mergeUpcomingEvents({ eventsUrl: eventsUrl, horizonDays: 90 })
                .then(function (result) {
                    var allEvents = result.events || [];
                    var thisWeekCutoff = NjcEvents.getWindowCutoffKey(result.nowBrussels, 7);
                    var thisWeekEvents = allEvents.filter(function (eventItem) {
                        return eventItem.key <= thisWeekCutoff;
                    }).slice(0, 4);

                    var eventsToShow = thisWeekEvents.length > 0 ? thisWeekEvents : allEvents.slice(0, 2);

                    if (eventsToShow.length === 0) {
                        thisWeekEventsList.innerHTML = "" +
                            "<li>" +
                            "  <h3>No events available right now</h3>" +
                            "  <p>Please check the Events page for updates.</p>" +
                            "</li>";
                        return;
                    }

                    thisWeekEventsList.innerHTML = eventsToShow.map(function (eventItem) {
                        var title = NjcEvents.escapeHtml(eventItem.title || "Event");
                        var date = NjcEvents.escapeHtml(NjcEvents.toDisplayDate(eventItem.year, eventItem.month, eventItem.day));
                        var time = NjcEvents.escapeHtml(NjcEvents.toDisplayTime(eventItem.hour, eventItem.minute));
                        return "" +
                            "<li>" +
                            "  <h3>" + title + "</h3>" +
                            "  <p>" + date + " at " + time + " (Belgium time)</p>" +
                            "</li>";
                    }).join("");
                })
                .catch(function () {
                    thisWeekEventsList.innerHTML = "" +
                        "<li>" +
                        "  <h3>Could not load this week events</h3>" +
                        "  <p>Please open the Events tab to refresh.</p>" +
                        "</li>";
                });
        })();
    </script>
</body>
</html>
