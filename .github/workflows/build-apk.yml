name: Build NJC APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'twa/**'
      - '.github/workflows/build-apk.yml'
  push:
    branches:
      - main
    paths:
      - 'twa/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: twa
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > jayathasoft.keystore

      - name: Determine signing mode
        id: signing
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -f jayathasoft.keystore ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "release_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.signing.outputs.release_enabled }}" = "true" ]; then
            echo "Building debug APK and signed release APK"
            ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon
          else
            echo "Signing secrets not fully configured; building debug APK only"
            unset KEYSTORE_PASSWORD
            unset KEY_ALIAS
            unset KEY_PASSWORD
            ./gradlew :app:assembleDebug --no-daemon
          fi

      - name: Show APK outputs
        run: |
          if [ -d twa/app/build/outputs/apk/debug ]; then
            ls -lah twa/app/build/outputs/apk/debug/
          fi
          if [ -d twa/app/build/outputs/apk/release ]; then
            ls -lah twa/app/build/outputs/apk/release/
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: njc-debug-apk
          path: twa/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        if: ${{ steps.signing.outputs.release_enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: njc-release-apk
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
