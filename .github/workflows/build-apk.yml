name: Build NJC APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'twa/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare release artifact
        run: cp twa/app/build/outputs/apk/release/app-release.apk twa/app/build/outputs/apk/release/njc-latest.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: njc-release-apk
          path: twa/app/build/outputs/apk/release/njc-latest.apk

      - name: Publish latest APK release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-apk
          name: NJC Latest APK
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifacts: twa/app/build/outputs/apk/release/njc-latest.apk
          body: |
            Latest auto-built NJC Android APK.
            Download `njc-latest.apk` on your phone and install it.
