name: Build NJC APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare keystore (optional, for signed release)
        working-directory: twa
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > jayathasoft.keystore
            echo "Decoded keystore to twa/jayathasoft.keystore"
          else
            echo "No KEYSTORE_BASE64 secret — will build unsigned debug APK if release signing is unavailable."
          fi

      - name: Build APK (signed release or debug fallback)
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -f jayathasoft.keystore ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "Building signed release APK…"
            ./gradlew assembleRelease --no-daemon
            echo "BUILD_VARIANT=release" >> "$GITHUB_ENV"
          else
            echo "Keystore or KEYSTORE_PASSWORD missing — building debug APK (install for testing; not Play Store release)."
            ./gradlew assembleDebug --no-daemon
            echo "BUILD_VARIANT=debug" >> "$GITHUB_ENV"
          fi

      - name: Upload signed release APK
        if: env.BUILD_VARIANT == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: njc-release-apk
          path: twa/app/build/outputs/apk/release/app-release.apk

      - name: Upload debug APK
        if: env.BUILD_VARIANT == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: njc-debug-apk
          path: twa/app/build/outputs/apk/debug/app-debug.apk

